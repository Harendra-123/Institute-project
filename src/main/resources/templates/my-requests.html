<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Requests | IRP System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; background: #f8fafc; color: #1e293b; min-height: 100vh; }

        /* Sidebar Design (Matching your working Dashboard) */
        .sidebar {
            width: 260px; background: #0f172a; color: white; padding: 30px 20px;
            position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 100;
        }
        .sidebar-brand { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; color: #fff; }
        .sidebar-subtitle { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 40px; }
        .menu { flex-grow: 1; }
        .menu a { display: flex; align-items: center; padding: 12px 15px; margin-bottom: 8px; color: #94a3b8; text-decoration: none; border-radius: 10px; font-size: 14px; font-weight: 500; transition: all 0.3s ease; }
        .menu a:hover { color: white; background: rgba(255, 255, 255, 0.05); }
        .menu a.active { background: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .sidebar-footer { border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 20px; }
        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .profile-circle { width: 40px; height: 40px; background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; }
        .logout-btn { width: 100%; padding: 12px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .logout-btn:hover { background: #ef4444; color: white; }

        /* Workspace Main Panel */
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }
        .container { background: #ffffff; padding: 32px; border-radius: 16px; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); border: 1px solid #edf2f7; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 2px solid #f1f5f9; padding-bottom: 16px; }
        h2 { margin: 0; font-size: 24px; font-weight: 700; color: #0f172a; }
        h2 i { color: #4f46e5; margin-right: 10px; }

        /* Table Components Styling */
        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; text-align: left; margin-top: 10px; }
        th { padding: 14px 20px; font-weight: 600; color: #64748b; text-transform: uppercase; font-size: 12px; letter-spacing: 0.05em; background-color: #f8fafc; border: none; }
        th:first-child { border-radius: 8px 0 0 8px; }
        th:last-child { border-radius: 0 8px 8px 0; }

        td { padding: 16px 20px; font-size: 14px; color: #1e293b; background: #ffffff; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
        tr td:first-child { border-left: 1px solid #e2e8f0; border-radius: 10px 0 0 10px; }
        tr td:last-child { border-right: 1px solid #e2e8f0; border-radius: 0 10px 10px 0; }
        tr:hover td { background-color: #f8fafc; }

        .res-pill { font-weight: 600; color: #0f172a; background: #f1f5f9; padding: 6px 12px; border-radius: 6px; font-size: 13px; display: inline-block; }

        /* Badges System */
        .status-badge { padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; text-transform: capitalize; }
        .pending-status { background: #fef3c7; color: #d97706; }
        .approved-status { background: #dcfce7; color: #15803d; }
        .rejected-status { background: #fee2e2; color: #b91c1c; }

        .empty-view { text-align: center; padding: 60px 40px; color: #64748b; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">Institute RP</div>
    <div class="sidebar-subtitle">User Workspace</div>
    <nav class="menu">
        <a href="/user/dashboard">
            <span style="margin-right:10px;">📦</span> View Resources
        </a>
        <a class="active" href="/user/dashboard"> <span style="margin-right:10px;">📝</span> My Requests
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="user-info">
            <div class="profile-circle">
                <span th:text="${username != null ? username.substring(0,1).toUpperCase() : 'U'}">R</span>
            </div>
            <div style="overflow: hidden;">
                <p style="font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" th:text="${username}">ram</p>
                <p style="font-size: 11px; color: #94a3b8;">Student/Faculty</p>
            </div>
        </div>
        <form action="/logout" method="get">
            <button class="logout-btn">Logout</button>
        </form>
    </div>
</aside>

<main class="main">
    <div class="container">
        <div class="header">
            <h2><i class="fa-solid fa-clipboard-list"></i> My Requests</h2>
        </div>

        <table>
            <thead>
            <tr>
                <th>Resource ID</th>
                <th>Resource Name</th>
                <th>Qty</th>
                <th>Date & Time</th>
                <th>Reason</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="request : ${requests}">
                <td>
                    <div><strong th:text="'ID: ' + ${request.resourceId}">ID: 1</strong></div>
                </td>

                <td>
                    <div class="res-pill"
                         th:text="${request.resource != null ? request.resource.resource_name : 'Unknown Resource'}">
                        Resource Name Loading...
                    </div>
                </td>

                <td th:text="${request.quantity}">2</td>

                <td>
                    <span th:text="${#temporals.format(request.startTime, 'MMM dd, HH:mm')}">May 05, 17:08</span>
                    <span style="color: #94a3b8; margin: 0 4px;">→</span>
                    <span th:text="${#temporals.format(request.endTime, 'MMM dd, HH:mm')}">May 05, 17:08</span>
                </td>

                <td th:text="${request.reason}">Personal</td>

                <td>
            <span th:class="'status-badge ' +
                           (${request.status == 'Pending' || request.status == 'pending'} ? 'pending-status' : '') +
                           (${request.status == 'Approved' || request.status == 'approved'} ? 'approved-status' : '') +
                           (${request.status == 'Rejected' || request.status == 'rejected'} ? 'rejected-status' : '')"
                  th:text="${request.status}">
                Pending
            </span>
                </td>
            </tr>
            </tbody>

        </table>

        <div th:if="${#lists.isEmpty(requests)}" class="empty-view">
            <span style="font-size: 40px; display: block; margin-bottom: 10px;">📂</span>
            <p>You haven't made any requests yet.</p>
        </div>
    </div>
</main>

</body>
</html>
