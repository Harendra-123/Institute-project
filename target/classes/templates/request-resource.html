<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Request Resource</title>

    <style>
        body{
            background:#f4f6f9;
            font-family:Arial;
            background:linear-gradient(135deg,#1e3a8a,#06b6d4);
        }

        .form-container{
            width:400px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2a5298;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#1e3c72;
        }

        /* 🔹 ERROR ALERT BOX STYLE */
        .error-alert {
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #fca5a5;
            font-weight: bold;
            line-height: 1.4;
        }
    </style>
</head>

<body>

<div class="form-container">

    <h2>Request Resource</h2>

    <div th:if="${errorMessage}" class="error-alert" th:text="${errorMessage}">
        Error Message Placeholder
    </div>

    <form th:action="@{/user/request}" method="post">

        <input type="hidden" name="resource_id" th:value="${resourceId}">

        <label>Quantity</label>
        <input type="number" name="quantity" required>

        <label>Start Time</label>
        <input type="datetime-local" name="start_time" required>

        <label>End Time</label>
        <input type="datetime-local" name="end_time" required>

        <label>Reason</label>
        <input type="text" name="reason" placeholder="Purpose of resource">

        <button type="submit">Submit Request</button>

    </form>

</div>

</body>
</html>
